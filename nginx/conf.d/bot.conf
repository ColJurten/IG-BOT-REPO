server {
    listen 80;
    server_name bot.developerworkshop.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bot.developerworkshop.online;

    ssl_certificate     /etc/letsencrypt/live/bot.developerworkshop.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.developerworkshop.online/privkey.pem;

    # Your existing bot (igbot on port 3000)
    location / {
        proxy_pass http://igbot:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # NEW: Instagram automation bot (on port 5000)
    location /ig-automation/ {
        proxy_pass http://ig-automation:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}