server {
    listen 80;
    server_name bot.developerworkshop.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bot.developerworkshop.online;

    # Resolve Docker service names dynamically so proxy targets survive container recreates.
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $igbot_upstream igbot:3000;
    set $ig_automation_upstream ig-automation:5000;

    ssl_certificate     /etc/letsencrypt/live/bot.developerworkshop.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.developerworkshop.online/privkey.pem;

    # Your existing bot (igbot on port 3000)
    location / {
        proxy_pass http://$igbot_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # NEW: Instagram automation bot (on port 5000)
    location /ig-automation/ {
        proxy_pass http://$ig_automation_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}